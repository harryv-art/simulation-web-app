name: Reproduce OIDC Scope Enforcement

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    env:
      TARGET_ALLOW_URL: https://harryv1.jfrog.io/artifactory/api/storage/generic-local
      TARGET_WRITE_URL: https://harryv1.jfrog.io/artifactory/generic-local/oidc-test/probe.txt
      TARGET_DENY_URL: https://harryv1.jfrog.io/artifactory/api/storage/harryv-npm-remote
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show run metadata
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Run UTC: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Request GitHub OIDC ID token
        id: github-id-token
        env:
          AUDIENCE: jfrog-github
        run: |
          set -euo pipefail
          resp="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}")"
          id_token="$(echo "$resp" | jq -r '.value')"
          if [ -z "$id_token" ] || [ "$id_token" = "null" ]; then
            echo "Failed to get GitHub ID token"
            echo "$resp"
            exit 1
          fi
          echo "::add-mask::$id_token"
          echo "id_token=$id_token" >> "$GITHUB_OUTPUT"
          echo "GitHub OIDC ID token acquired"

      - name: Exchange GitHub ID token for JFrog access token
        id: jf-oidc-token
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_OIDC_PROVIDER: ${{ secrets.JF_OIDC_PROVIDER }}
          JF_OIDC_IDENTITY: ${{ secrets.JF_OIDC_IDENTITY }}
          ID_TOKEN: ${{ steps.github-id-token.outputs.id_token }}
        run: |
          set -euo pipefail
          token_resp="$(curl -sS -X POST "${JF_URL}/access/api/v1/oidc/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token" \
            --data-urlencode "subject_token=${ID_TOKEN}" \
            --data-urlencode "provider_name=${JF_OIDC_PROVIDER}" \
            --data-urlencode "identity_mapping=${JF_OIDC_IDENTITY}")"
          access_token="$(echo "$token_resp" | jq -r '.access_token')"
          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "OIDC exchange failed"
            echo "$token_resp"
            exit 1
          fi
          echo "::add-mask::$access_token"
          echo "access_token=$access_token" >> "$GITHUB_OUTPUT"
          echo "OIDC exchange token acquired"

      - name: Decode and print OIDC exchange token claims
        env:
          OIDC_ACCESS_TOKEN: ${{ steps.jf-oidc-token.outputs.access_token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os

          token = os.environ["OIDC_ACCESS_TOKEN"]
          parts = token.split(".")
          if len(parts) < 2:
              raise SystemExit("Token is not JWT-like; cannot decode payload")

          payload = parts[1]
          payload += "=" * (-len(payload) % 4)
          decoded = base64.urlsafe_b64decode(payload.encode("utf-8")).decode("utf-8")
          data = json.loads(decoded)

          interesting = {
              "iss": data.get("iss"),
              "sub": data.get("sub"),
              "aud": data.get("aud"),
              "scp": data.get("scp"),
              "exp": data.get("exp"),
              "iat": data.get("iat"),
          }
          print("Decoded JFrog token claims:")
          print(json.dumps(interesting, indent=2))
          PY

      - name: Validate OIDC token against allow/deny URLs
        env:
          OIDC_ACCESS_TOKEN: ${{ steps.jf-oidc-token.outputs.access_token }}
        run: |
          set -euo pipefail

          if [ -n "${TARGET_ALLOW_URL:-}" ]; then
            allow_code="$(curl -sS -o /tmp/oidc-allow.bin -w '%{http_code}' \
              -H "Authorization: Bearer ${OIDC_ACCESS_TOKEN}" \
              "${TARGET_ALLOW_URL}")"
            echo "OIDC token ALLOW URL status: ${allow_code}"
          fi

          if [ -n "${TARGET_WRITE_URL:-}" ]; then
            write_code="$(curl -sS -o /tmp/oidc-write.out -w '%{http_code}' \
              -X PUT \
              -H "Authorization: Bearer ${OIDC_ACCESS_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data "oidc-write-test $(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
              "${TARGET_WRITE_URL}")"
            echo "OIDC token WRITE URL status: ${write_code}"

            read_back_code="$(curl -sS -o /tmp/oidc-read-back.bin -w '%{http_code}' \
              -H "Authorization: Bearer ${OIDC_ACCESS_TOKEN}" \
              "${TARGET_WRITE_URL}")"
            echo "OIDC token READ-BACK URL status: ${read_back_code}"
          fi

          deny_code="$(curl -sS -o /tmp/oidc-deny.bin -w '%{http_code}' \
            -H "Authorization: Bearer ${OIDC_ACCESS_TOKEN}" \
            "${TARGET_DENY_URL}")"
          echo "OIDC token DENY URL status: ${deny_code}"
          if [ "${deny_code}" -eq 200 ]; then
            echo "Anomaly: OIDC token can access DENY target"
          fi

      - name: Optional admin token control test
        if: ${{ secrets.JF_ADMIN_TOKEN != '' }}
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ADMIN_TOKEN: ${{ secrets.JF_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          admin_resp="$(curl -sS -X POST "${JF_URL}/access/api/v1/tokens" \
            -H "Authorization: Bearer ${JF_ADMIN_TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "username=github-simulation-web-app" \
            --data-urlencode "scope=applied-permissions/groups:github-repo-simulation-web-app" \
            --data-urlencode "expires_in=3600")"
          admin_token="$(echo "$admin_resp" | jq -r '.access_token')"
          if [ -z "$admin_token" ] || [ "$admin_token" = "null" ]; then
            echo "Admin token creation failed"
            echo "$admin_resp"
            exit 1
          fi
          echo "::add-mask::$admin_token"

          if [ -n "${TARGET_ALLOW_URL:-}" ]; then
            allow_code="$(curl -sS -o /tmp/admin-allow.bin -w '%{http_code}' \
              -H "Authorization: Bearer ${admin_token}" \
              "${TARGET_ALLOW_URL}")"
            echo "Admin token ALLOW URL status: ${allow_code}"
          fi

          if [ -n "${TARGET_WRITE_URL:-}" ]; then
            write_code="$(curl -sS -o /tmp/admin-write.out -w '%{http_code}' \
              -X PUT \
              -H "Authorization: Bearer ${admin_token}" \
              -H "Content-Type: text/plain" \
              --data "admin-write-test $(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
              "${TARGET_WRITE_URL}")"
            echo "Admin token WRITE URL status: ${write_code}"
          fi

          deny_code="$(curl -sS -o /tmp/admin-deny.bin -w '%{http_code}' \
            -H "Authorization: Bearer ${admin_token}" \
            "${TARGET_DENY_URL}")"
          echo "Admin token DENY URL status: ${deny_code}"
